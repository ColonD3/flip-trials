<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Trials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="noise"></div>

    <main class="app">
      <header class="topbar panel">
        <h1>Flip Trials</h1>
        <p>Bigger trick pool, cleaner names, G-Tramp + On Ground modes.</p>
      </header>

      <section class="panel setup-panel setup-panel-four">
        <div class="select-group">
          <label for="modeSelect">Game Mode</label>
          <select id="modeSelect">
            <option value="gtramp">G-Tramp</option>
            <option value="ground">On Ground</option>
          </select>
        </div>

        <div class="select-group">
          <label for="categorySelect">Category</label>
          <select id="categorySelect">
            <option value="all">All</option>
            <option value="twisting">Twisting</option>
            <option value="flipping">Flipping</option>
            <option value="creative">Creative</option>
          </select>
        </div>

        <div class="select-group">
          <label for="rankSelect">Rank</label>
          <select id="rankSelect">
            <option value="beginner">Beginner</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="master">Master</option>
          </select>
        </div>

        <div class="select-group">
          <label for="progressionSelect">Rank Progression</label>
          <select id="progressionSelect">
            <option value="fixed">Stay On Selected Rank</option>
            <option value="cycle">Cycle Beginner → Master</option>
          </select>
        </div>
      </section>

      <p id="modeHint" class="panel mode-hint"></p>

      <section class="status-grid status-grid-four">
        <article class="panel stat-card">
          <h2>Round</h2>
          <p id="roundValue" class="stat-value">1</p>
        </article>

        <article class="panel stat-card">
          <h2>Rank</h2>
          <p id="rankValue" class="stat-value">Beginner</p>
        </article>

        <article class="panel stat-card">
          <h2>Mode</h2>
          <p id="modeValue" class="stat-value">G-Tramp</p>
        </article>

        <article class="panel stat-card fail-card">
          <h2>Fail Meter</h2>
          <p id="failValue" class="stat-value">_ _ _ _</p>
        </article>
      </section>

      <section class="panel trick-panel">
        <p class="trick-label">Current Trick</p>
        <h3 id="trickName">Press Start Run</h3>
        <p id="trickMeta" class="trick-meta">Choose a mode, category, rank, and progression.</p>
        <p id="trickAliases" class="trick-aliases">Names + aliases will show here.</p>
      </section>

      <section class="controls panel controls-five">
        <button id="startBtn" class="btn btn-main">Start Run</button>
        <button id="successBtn" class="btn btn-success" disabled>Success</button>
        <button id="failBtn" class="btn btn-danger" disabled>Fail</button>
        <button id="setupBtn" class="btn btn-alt" disabled>No Setup Here</button>
        <button id="rerollBtn" class="btn btn-alt-secondary" disabled>Reroll</button>
      </section>

      <section id="feed" class="panel feed" aria-live="polite"></section>
    </main>

    <script src="./script.js?v=20260415-3"></script>
  </body>
</html>
